<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  body { font: 13px/1.5 -apple-system, system-ui, sans-serif; width: 280px; margin: 0; padding: 14px; }
  h1 { font-size: 14px; margin: 0 0 10px; }
  label { display: block; font-size: 11px; color: #777; margin: 8px 0 2px; }
  input { width: 100%; box-sizing: border-box; padding: 6px 8px; border: 1px solid #ccc; border-radius: 6px; font: inherit; }
  .row { display: flex; gap: 8px; margin-top: 10px; }
  button { flex: 1; padding: 8px; border: 0; border-radius: 6px; font: inherit; font-weight: 600; cursor: pointer; }
  #start { background: #4a7; color: #fff; }
  #stop { background: #e55; color: #fff; }
  #marker { background: #58e; color: #fff; }
  .ghost { background: #eee; color: #333; }
  button:disabled { opacity: .45; cursor: default; }
  .status { margin-top: 12px; padding: 8px; border-radius: 6px; background: #f4f4f5; font-size: 12px; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #bbb; margin-right: 6px; }
  .dot.live { background: #e33; animation: pulse 1s infinite; }
  .mic-ok { color: #4a7; } .mic-bad { color: #c70; }
  @keyframes pulse { 50% { opacity: .3; } }
</style>
</head>
<body>
  <h1>Sync Spike Recorder</h1>

  <label for="backend">Backend URL</label>
  <input id="backend" type="text" placeholder="http://localhost:8787">

  <div class="row">
    <button id="grantMic" class="ghost">Grant microphone</button>
  </div>
  <div id="micStatus" style="font-size:11px;margin-top:4px;"></div>

  <div class="row">
    <button id="start">Start</button>
    <button id="stop" disabled>Stop</button>
  </div>
  <div class="row">
    <button id="marker" class="ghost" disabled>Mark new workflow</button>
  </div>

  <div class="status"><span id="dot" class="dot"></span><span id="statusText">Idle</span></div>

  <script type="module" src="popup.js"></script>
</body>
</html>
