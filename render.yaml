# Render Blueprint — the ONLY Render-specific file (app code stays host-agnostic).
# SKELETON: infra is declared now; app services are uncommented as each milestone
# lands. Copilot-first (Phase 1): api + worker + web(Studio) + copilot widget/answer API.
# Cloud deploy is P1-M4 — the FINAL Phase-1 step. Portal/articles = Phase 2 (deferred).
# See docs/version-1-roadmap.md.

databases:
  - name: sync-db
    plan: free
    databaseName: sync
    user: sync

services:
  - type: keyvalue
    name: sync-redis
    plan: free
    ipAllowList: [] # only reachable from Render services

