# Render Blueprint — the ONLY Render-specific file (app code stays host-agnostic).
# SKELETON: infra is declared now; app services are uncommented as each milestone
# lands (api=M2, worker=M3, web=M4, portal=M5). Full wiring at M6.

databases:
  - name: sync-db
    plan: free
    databaseName: sync
    user: sync

services:
  - type: keyvalue
    name: sync-redis
    plan: free
    ipAllowList: [] # only reachable from Render services

