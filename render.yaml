# Render Blueprint — the ONLY Render-specific file (app code stays host-agnostic).
# Copilot-first Version 1, Phase 1. THIS IS THE FREE / TESTING configuration ($0/mo):
#   sync-api (Fastify API + synthesis worker in ONE web service) + sync-web (Studio) +
#   sync-widget (static) + free Postgres + free Key Value.
#
# Why the worker is folded into the api: Render background workers are PAID-only, so for a $0
# deploy the synthesis worker runs INSIDE the api web service via `start:all` (src/all.ts boots
# both the Fastify server and the BullMQ worker in one process).
#
# ⚠️ FREE-TIER CAVEATS (fine for testing, NOT production):
#   - Free Postgres is DELETED 30 days after creation (14-day grace) — recreate when it lapses.
#   - Free Key Value (Redis) has NO persistence — a restart drops queued synthesis jobs.
#   - Free web services SPIN DOWN after ~15 min idle (~1 min cold start). The embedded worker only
#     runs while the api is awake — a recorder upload wakes it, then synthesis proceeds.
#   - 750 free instance-hours/month per workspace (shared); idle/spun-down services don't consume them.
#
# ➜ TO GO PRODUCTION (always-on, reliable): split the worker back into its own `type: worker`
#   service (dockerCommand: pnpm --filter @sync/api worker; api back to plain `start`), move the
#   migration to a preDeployCommand, and change every free plan to paid (Postgres -> basic-256mb,
#   web/worker/keyvalue -> starter). The standalone-worker blueprint is in git history (commit 3488326).
#
# Before first deploy: pre-create the R2 bucket + an Object R/W token; fill the sync-r2 group +
# OPENAI_API_KEY; set AUTH_SECRET + the *.onrender.com URLs on sync-web (see the secrets table in chat).

databases:
  - name: sync-db
    plan: free # ⚠️ deleted 30 days after creation — testing only
    databaseName: sync
    user: sync

# Shared object-storage (R2) credentials — entered ONCE here, referenced by api + web.
envVarGroups:
  - name: sync-r2
    envVars:
      - { key: R2_ENDPOINT, sync: false } # https://<accountid>.r2.cloudflarestorage.com
      - { key: R2_REGION, value: auto }
      - { key: R2_ACCESS_KEY_ID, sync: false }
      - { key: R2_SECRET_ACCESS_KEY, sync: false }
      - { key: R2_BUCKET, sync: false } # sync-artifacts (pre-created)

services:
  - type: keyvalue
    name: sync-redis
    plan: free # ⚠️ no persistence — queued jobs are lost on restart
    ipAllowList: [] # only reachable from Render services

  # --- API + synthesis worker in ONE free web service ---
  # Runs DB migrations (idempotent) then boots Fastify + the BullMQ worker via start:all.
  - type: web
    name: sync-api
    runtime: docker
    plan: free
    dockerfilePath: ./packages/api/Dockerfile
    dockerContext: .
    dockerCommand: pnpm --filter @sync/api start:all
    envVars:
      - fromGroup: sync-r2
      - { key: PORT, value: 8787 }
      - { key: DATABASE_URL, fromDatabase: { name: sync-db, property: connectionString } }
      - { key: REDIS_URL, fromService: { name: sync-redis, type: keyvalue, property: connectionString } }
      - { key: OPENAI_API_KEY, sync: false }
      - { key: TRANSCRIBE_MODEL, value: whisper-1 }
      - { key: SYNTH_MODEL, value: gpt-4o }

  # --- Studio (Next.js): approve workflows, copilot settings, analytics ---
  - type: web
    name: sync-web
    runtime: docker
    plan: free
    dockerfilePath: ./packages/web/Dockerfile
    dockerContext: .
    envVars:
      - fromGroup: sync-r2
      - { key: DATABASE_URL, fromDatabase: { name: sync-db, property: connectionString } }
      - { key: AUTH_SECRET, sync: false }
      - { key: AUTH_URL, sync: false } # the deployed web URL (https://sync-web.onrender.com)
      - { key: AUTH_TRUST_HOST, value: true }
      # PUBLIC api URL — baked into the browser embed snippet (data-sync-api) + extension payload.
      - { key: SYNC_API_URL, sync: false } # https://sync-api.onrender.com
      - { key: SYNC_WIDGET_URL, sync: false } # https://sync-widget.onrender.com/sync-copilot.js

  # --- Widget host: serves the embeddable sync-copilot.js bundle (static site, free) ---
  - type: web
    name: sync-widget
    runtime: static
    # Render's static builder auto-detects pnpm; do NOT `corepack enable` — its /usr/bin is read-only (EROFS).
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @sync/widget build
    staticPublishPath: packages/widget/dist

  # (Phase 2 — deferred: a sync-portal web service for the public help site.)
