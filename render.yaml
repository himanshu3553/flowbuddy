# Render Blueprint — PRODUCTION (FlowBuddyAI.com). Read by the prod blueprint instance:
# branch `main`, default blueprint path (this file). The DEV environment lives in
# `render.dev.yaml` (branch `dev`, custom blueprint path) — both files ride every branch so
# FF releases stay clean; each blueprint ignores the other's file.
#
# Topology + cost (~$30/mo — locked 2026-07-16, Redis revised to paid 2026-07-17) + runbook: docs/deploy-production.md.
# Service mechanics (Dockerfiles, gotchas, troubleshooting): docs/deploy-render.md.
#
#   flowbuddy-api     Starter $7   api.flowbuddyai.com     copilot API + ingestion + embedded synthesis worker (start:all)
#   flowbuddy-web     Starter $7   app.flowbuddyai.com     the Studio (Next.js)
#   flowbuddy-db      Basic $6     —                       Postgres (durable; PITR included)
#   flowbuddy-widget  Free static  widget.flowbuddyai.com  both widget bundles from one build
#   flowbuddy-landing Free static  flowbuddyai.com + www   marketing landing page
#   flowbuddy-redis   Starter $10  —                       BullMQ synthesis queue (persistent; noeviction)
#
# Custom domains are attached in the dashboard (no blueprint field) — see deploy-production.md §3.
# Every URL secret gets its final custom-domain value at creation, so onrender.com never leaks
# into an embed snippet.
#
# Scaling ladder (worker split → durable queue → headroom → ops): deploy-production.md §7.

databases:
  - name: flowbuddy-db
    plan: basic-256mb # durable (no 30-day self-deletion) + point-in-time recovery
    databaseName: flowbuddy
    user: flowbuddy

# Shared object-storage (R2) credentials — entered ONCE here, referenced by api + web.
envVarGroups:
  - name: flowbuddy-r2
    envVars:
      - { key: R2_ENDPOINT, sync: false } # https://<accountid>.r2.cloudflarestorage.com
      - { key: R2_REGION, value: auto }
      - { key: R2_ACCESS_KEY_ID, sync: false } # prod-only token — never share dev credentials
      - { key: R2_SECRET_ACCESS_KEY, sync: false }
      - { key: R2_BUCKET, sync: false } # flowbuddy-artifacts (pre-created, prod-only)

services:
  - type: keyvalue
    name: flowbuddy-redis
    # Paid (decision 2026-07-17): Render allows only ONE free KV per workspace and dev holds it —
    # and prod gets persistence with it (queued synthesis jobs survive restarts; ex-Scale-step-2).
    plan: starter
    maxmemoryPolicy: noeviction # BullMQ requirement — default allkeys-lru can silently evict queued jobs
    ipAllowList: [] # only reachable from Render services

  # --- API + embedded synthesis worker (start:all) — always-on, non-negotiable ---
  # Runs DB migrations (idempotent) then boots Fastify + the BullMQ worker in one process.
  # On paid plans Render health-checks the new instance before switching traffic, so the old
  # instance keeps serving while the new one migrates (migrations stay additive-only).
  - type: web
    name: flowbuddy-api
    runtime: docker
    plan: starter
    dockerfilePath: ./packages/api/Dockerfile
    dockerContext: .
    dockerCommand: pnpm --filter @flowbuddy/api start:all
    envVars:
      - fromGroup: flowbuddy-r2
      - { key: PORT, value: 8787 }
      # Structured JSON logs at info+ — tunable live in the dashboard, no redeploy needed.
      - { key: LOG_LEVEL, value: info }
      - { key: DATABASE_URL, fromDatabase: { name: flowbuddy-db, property: connectionString } }
      - { key: REDIS_URL, fromService: { name: flowbuddy-redis, type: keyvalue, property: connectionString } }
      - { key: OPENAI_API_KEY, sync: false }
      - { key: TRANSCRIBE_MODEL, value: whisper-1 }
      - { key: SYNTH_MODEL, value: gpt-4o }
      # P1-M3 hybrid retrieval — must match the vector(1536) column dims (see @flowbuddy/synthesis embeddings.ts).
      - { key: EMBED_MODEL, value: text-embedding-3-small }
      # https://app.flowbuddyai.com — the Studio origin is exempt from workspace origin allowlists
      # so the Copilot page's real-widget tester keeps working after a customer restricts origins.
      - { key: FLOWBUDDY_STUDIO_URL, sync: false }
      # Optional stronger vision model for the P2-M5 diagnostic path (unset = SYNTH_MODEL):
      # - { key: REASON_MODEL, sync: false }

  # --- Studio (Next.js) — paid so customer dashboards never cold-start ---
  - type: web
    name: flowbuddy-web
    runtime: docker
    plan: starter
    dockerfilePath: ./packages/web/Dockerfile
    dockerContext: .
    envVars:
      - fromGroup: flowbuddy-r2
      - { key: LOG_LEVEL, value: info }
      - { key: DATABASE_URL, fromDatabase: { name: flowbuddy-db, property: connectionString } }
      # Studio enqueues re-process jobs straight onto the worker's queue — needs the SAME Redis as the api.
      - { key: REDIS_URL, fromService: { name: flowbuddy-redis, type: keyvalue, property: connectionString } }
      - { key: AUTH_SECRET, sync: false } # fresh openssl rand -hex 32 — do NOT reuse dev's
      - { key: AUTH_URL, sync: false } # https://app.flowbuddyai.com
      - { key: AUTH_TRUST_HOST, value: true }
      # No OpenAI config here: the Studio makes NO OpenAI calls — its tester embeds the REAL widget,
      # so every answer goes through flowbuddy-api (which owns OPENAI_API_KEY/EMBED_MODEL).
      # PUBLIC URLs baked into the browser embed snippet (data-flowbuddy-api) + extension payload:
      - { key: FLOWBUDDY_API_URL, sync: false } # https://api.flowbuddyai.com
      - { key: FLOWBUDDY_WIDGET_URL, sync: false } # https://widget.flowbuddyai.com/flowbuddy-copilot.js
      # Transactional email — REQUIRED in prod (default onboarding@resend.dev only delivers to the
      # Resend account owner, so real signups would never get verification/reset emails).
      - { key: RESEND_API_KEY, sync: false }
      - { key: EMAIL_FROM, sync: false } # no-reply@flowbuddyai.com (Resend-verified domain)
      # Chrome Web Store listing — set once the prod-baked extension build is live (v0.6.0+).
      - { key: FLOWBUDDY_EXTENSION_URL, sync: false }

  # --- Widget host: BOTH bundles (flowbuddy-copilot.js + flowbuddy-copilot-render.js) from one build ---
  - type: web
    name: flowbuddy-widget
    runtime: static
    # Render's static builder auto-detects pnpm; do NOT `corepack enable` — its /usr/bin is read-only (EROFS).
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @flowbuddy/widget build
    staticPublishPath: packages/widget/dist

  # --- Marketing landing page (flowbuddyai.com + www) ---
  - type: web
    name: flowbuddy-landing
    runtime: static
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @flowbuddy/landing build
    staticPublishPath: packages/landing/dist
