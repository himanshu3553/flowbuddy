<!-- @dsCard group="Brand" viewport="700x180" subtitle="Gradient rounded-square mark + FlowBuddy wordmark" name="Logo" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px;background:#fff;font-family:var(--font-sans);color:var(--ink);display:flex;align-items:center;gap:40px;flex-wrap:wrap;}
  .panel{display:flex;align-items:center;gap:14px;}
  .t{font:500 10px var(--font-mono);color:var(--text-faint);margin-top:10px;}
  .dark{background:var(--ink);border-radius:14px;padding:18px 22px;display:flex;align-items:center;gap:12px;}
</style>
</head>
<body>
  <div>
    <div class="panel"><img src="../assets/logo-wordmark.svg" alt="FlowBuddy" height="40"></div>
    <div class="t">logo-wordmark.svg</div>
  </div>
  <div>
    <div class="panel"><img src="../assets/logo-mark.svg" alt="FlowBuddy mark" height="48"></div>
    <div class="t">logo-mark.svg</div>
  </div>
  <div>
    <div class="dark"><img src="../assets/logo-mark.svg" alt="FlowBuddy mark" height="28"><span style="font:800 17px var(--font-sans);letter-spacing:-.02em;color:#fff;">FlowBuddy</span></div>
    <div class="t">on dark / sidebar lockup</div>
  </div>
</body>
</html>
