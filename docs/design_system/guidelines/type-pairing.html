<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<style>

<body>
  <div class="card">
    <div style="font:700 10.5px var(--font-mono);letter-spacing:.1em;color:var(--text-faint);text-transform:uppercase;margin-bottom:9px;">Get started</div>

    <div style="font:400 13px/1.55 var(--font-sans);color:var(--text-body);margin-top:5px;">Record once, approve the workflows it may use, paste one snippet.</div>
    <div style="font:400 11.5px var(--font-mono);color:var(--text-faint);margin-top:12px;">1 / 4 steps done · PII masked</div>
