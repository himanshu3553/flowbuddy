<!-- @dsCard group="Type" viewport="700x210" subtitle="JetBrains Mono = the technical voice: eyebrows, status, selectors, code" name="Mono — the system voice" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans);color:var(--ink);}
  .spec{display:flex;align-items:center;gap:14px;padding:9px 0;border-bottom:1px solid var(--border);}
  .spec:last-child{border-bottom:0;}
  .tag{font:500 10px var(--font-mono);color:var(--text-faint);width:120px;flex:0 0 120px;}
</style>
</head>
<body>
  <div class="spec"><span class="tag">eyebrow · 700/10.5</span><span style="font:700 10.5px var(--font-mono);letter-spacing:.1em;color:var(--text-faint);text-transform:uppercase;">Get started</span></div>
  <div class="spec"><span class="tag">micro · 700/9.5</span><span style="font:700 9.5px var(--font-mono);letter-spacing:.06em;color:var(--primary);">STEP 1</span><span style="font:700 9.5px var(--font-mono);letter-spacing:.06em;color:var(--success-text);background:var(--success-bg-2);border:1px solid var(--success-border);padding:3px 8px;border-radius:999px;">READY</span></div>
  <div class="spec"><span class="tag">code · 400/11.5</span><code style="font:400 11.5px var(--font-mono);color:var(--text-body);background:var(--paper);border:1px solid var(--border);border-radius:4px;padding:3px 7px;">button[data-test='acct-menu']</code></div>
  <div class="spec"><span class="tag">code · on dark</span><code style="font:400 11.5px var(--font-mono);color:var(--code-fg);background:var(--code-bg);border-radius:6px;padding:6px 10px;">&lt;script src="cdn.getsync.app/copilot.js"&gt;</code></div>
</body>
</html>
