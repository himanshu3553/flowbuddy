<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans);color:var(--ink);}

<body>

  <div class="spec"><span class="tag">display · 800/22</span><span style="font:800 22px/1.15 var(--font-sans);letter-spacing:-.02em;">Get your copilot live</span></div>
  <div class="spec"><span class="tag">title · 700/16</span><span style="font:700 16px var(--font-sans);letter-spacing:-.01em;">Knowledge Base</span></div>

</html>
