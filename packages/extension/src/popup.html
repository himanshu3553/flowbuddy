<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  body { font: 13px/1.5 -apple-system, system-ui, sans-serif; width: 280px; margin: 0; padding: 14px; }
  h1 { font-size: 14px; margin: 0 0 10px; }
  .row { display: flex; gap: 8px; margin-top: 10px; }
  button { flex: 1; padding: 8px; border: 0; border-radius: 6px; font: inherit; font-weight: 600; cursor: pointer; }
  #start { background: #4a7; color: #fff; }
  #stop { background: #e55; color: #fff; }
  #marker { background: #58e; color: #fff; }
  .ghost { background: #eee; color: #333; }
  button:disabled { opacity: .45; cursor: default; }
  .conn { margin: 0 0 6px; padding: 9px 10px; border-radius: 6px; background: #f4f4f5; font-size: 12px; display: flex; align-items: center; gap: 8px; }
  .conn.on { background: #def3e4; color: #176c33; }
  .conn .who { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .conn button { flex: 0 0 auto; padding: 5px 10px; font-size: 12px; }
  #connect { background: #2d6cdf; color: #fff; }
  .status { margin-top: 12px; padding: 8px 10px; border-radius: 6px; background: #f4f4f5; font-size: 12px; display: flex; align-items: center; }
  .status.ok { background: #def3e4; color: #176c33; }
  .status.fail { background: #fdecec; color: #a11; }
  .status.rec { background: #fdecec; color: #b11; font-weight: 600; }
  .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; background: #bbb; margin-right: 7px; flex: none; }
  .dot.live { background: #e11; box-shadow: 0 0 0 0 rgba(225,17,17,.5); animation: pulse 1.1s infinite; }
  .mic-ok { color: #4a7; } .mic-bad { color: #c70; }
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(225,17,17,.5); } 70% { box-shadow: 0 0 0 6px rgba(225,17,17,0); } 100% { box-shadow: 0 0 0 0 rgba(225,17,17,0); } }
</style>
</head>
<body>
  <h1>Sync Recorder</h1>

  <div id="conn" class="conn">Checking connection…</div>

  <div class="row">
    <button id="grantMic" class="ghost">Grant microphone</button>
  </div>
  <div id="micStatus" style="font-size:11px;margin-top:4px;"></div>

  <div class="row">
    <button id="start" disabled>Start</button>
    <button id="stop" disabled>Stop</button>
  </div>
  <div class="row">
    <button id="marker" class="ghost" disabled>Mark new workflow</button>
  </div>

  <div id="status" class="status"><span id="dot" class="dot"></span><span id="statusText">Idle</span></div>

  <script type="module" src="popup.js"></script>
</body>
</html>
