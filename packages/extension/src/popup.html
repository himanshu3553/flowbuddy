<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  /* Neutral palette — mirrors the Sync Studio shadcn/ui theme so the recorder + Studio match. */
  :root {
    --bg: #ffffff;
    --fg: #0a0a0a;
    --muted: #f5f5f5;
    --muted-fg: #737373;
    --border: #e5e5e5;
    --primary: #171717;
    --primary-fg: #fafafa;
    --primary-hover: #2a2a2a;
    --destructive: #ef4444;
    --destructive-hover: #dc2626;
    --radius: 8px;
  }
  * { box-sizing: border-box; }
  body {
    font: 13px/1.5 -apple-system, system-ui, "Segoe UI", Roboto, sans-serif;
    width: 300px; margin: 0; padding: 16px; color: var(--fg); background: var(--bg);
  }

  .brand { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
  .brand .logo {
    width: 22px; height: 22px; border-radius: 6px; background: var(--primary);
    color: var(--primary-fg); font-weight: 700; font-size: 12px;
    display: flex; align-items: center; justify-content: center; flex: none;
  }
  .brand h1 { font-size: 14px; font-weight: 600; margin: 0; letter-spacing: -0.01em; }

  .row { display: flex; gap: 8px; margin-top: 10px; }

  button {
    flex: 1; height: 34px; padding: 0 12px; border: 1px solid transparent;
    border-radius: 6px; font: inherit; font-weight: 500; cursor: pointer;
    transition: background-color .15s ease, opacity .15s ease;
  }
  button:disabled { opacity: .5; cursor: default; }
  #start { background: var(--primary); color: var(--primary-fg); }
  #start:hover:not(:disabled) { background: var(--primary-hover); }
  #stop { background: var(--destructive); color: #fff; }
  #stop:hover:not(:disabled) { background: var(--destructive-hover); }
  #connect { background: var(--primary); color: var(--primary-fg); }
  #connect:hover:not(:disabled) { background: var(--primary-hover); }
  .ghost { background: var(--bg); color: var(--fg); border: 1px solid var(--border); }
  .ghost:hover:not(:disabled) { background: var(--muted); }

  .conn {
    margin: 0 0 4px; padding: 9px 11px; border: 1px solid var(--border);
    border-radius: var(--radius); background: var(--muted); font-size: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .conn.on { background: #f0fdf4; border-color: #bbf7d0; color: #166534; }
  .conn .who { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .conn button { flex: 0 0 auto; height: 28px; padding: 0 10px; font-size: 12px; }

  #micStatus { font-size: 11px; margin-top: 6px; }
  .mic-ok { color: #15803d; }
  .mic-bad { color: #b45309; }

  .status {
    margin-top: 12px; padding: 9px 11px; border: 1px solid var(--border);
    border-radius: var(--radius); background: var(--muted); color: var(--muted-fg);
    font-size: 12px; display: flex; align-items: center; flex-wrap: wrap; gap: 6px;
  }
  .status.ok { background: #f0fdf4; border-color: #bbf7d0; color: #166534; }
  .status.fail { background: #fef2f2; border-color: #fecaca; color: #991b1b; }
  .status.rec { background: #fef2f2; border-color: #fecaca; color: #b91c1c; font-weight: 600; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #a3a3a3; flex: none; }
  .dot.live { background: #ef4444; box-shadow: 0 0 0 0 rgba(239,68,68,.5); animation: pulse 1.1s infinite; }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(239,68,68,.5); }
    70% { box-shadow: 0 0 0 6px rgba(239,68,68,0); }
    100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
  }
</style>
</head>
<body>
  <header class="brand">
    <span class="logo">S</span>
    <h1>Sync Recorder</h1>
  </header>

  <div id="conn" class="conn">Checking connection…</div>

  <div class="row">
    <button id="grantMic" class="ghost">Grant microphone</button>
  </div>
  <div id="micStatus"></div>

  <div class="row">
    <button id="start" disabled>Start</button>
    <button id="stop" disabled>Stop</button>
  </div>
  <div class="row">
    <button id="marker" class="ghost" disabled>Mark new workflow</button>
  </div>

  <div id="status" class="status"><span id="dot" class="dot"></span><span id="statusText">Idle</span></div>

  <script type="module" src="popup.js"></script>
</body>
</html>
